<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJ Kids - Lets Learn</title>
    
    <!-- Google Fonts: Fredoka (Rounded & Bold) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Fredoka', 'sans-serif'],
                    },
                    boxShadow: {
                        'brutal': '4px 4px 0px 0px rgba(0,0,0,1)',
                        'brutal-sm': '2px 2px 0px 0px rgba(0,0,0,1)',
                    }
                }
            }
        }
    </script>

    <!-- Import Database Kamus -->
    <script src="kamus.js"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom Styles for Neo-Brutalism & Layout */
        body {
            margin: 0;
            background-color: #BAE6FD;
            font-family: 'Fredoka', sans-serif;
        }

        .bg-dot-pattern {
            background-color: #ffffff;
            background-image: radial-gradient(#cbd5e1 2px, transparent 2px);
            background-size: 20px 20px;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .brutal-border { border: 4px solid black; }
        .brutal-border-sm { border: 3px solid black; }
        
        .brutal-click:active {
            transform: translate(2px, 2px);
            box-shadow: none !important;
        }

        /* Balloon Flying Animation */
        .balloon-element {
            opacity: 0;
            transform: translateY(150px);
        }
        @keyframes floatUp {
            0% { transform: translateY(150px); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-520px); opacity: 0; }
        }
        .float-balloon-0 { animation: floatUp 7s linear infinite both; animation-delay: 0s; }
        .float-balloon-1 { animation: floatUp 7s linear infinite both; animation-delay: 2s; }
        .float-balloon-2 { animation: floatUp 7s linear infinite both; animation-delay: 4.5s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">

    <!-- React Root -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Data Cadangan jika kamus.js gagal termuat
        const getKamusData = () => {
            return window.JJ_Kamus_Lengkap || [
                { word: 'Apple', mean: 'Apel', topic: 'Buah-buahan 🍎', emoji: '🍎' },
                { word: 'Cat', mean: 'Kucing', topic: 'Hewan 🐱', emoji: '🐱' },
                { word: 'Dog', mean: 'Anjing', topic: 'Hewan 🐱', emoji: '🐶' },
                { word: 'Book', mean: 'Buku', topic: 'Sekolah & Belajar ✏️', emoji: '📖' },
                { word: 'Car', mean: 'Mobil', topic: 'Kendaraan 🚗', emoji: '🚗' },
                { word: 'Big', mean: 'Besar', topic: 'Kata Sifat 🧠', emoji: '🐘' },
                { word: 'Red Apple', mean: 'Apel Merah', topic: 'Kombinasi Kata 🔀', emoji: '🍎' }
            ];
        };

        const boxBrutal = "brutal-border shadow-brutal rounded-2xl";
        const btnBrutal = "brutal-border-sm shadow-brutal brutal-click transition-all rounded-xl cursor-pointer";

        const speakText = (text, langCode = 'en-US', rate = 0.5) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = langCode; 
                utterance.rate = rate; 
                window.speechSynthesis.speak(utterance);
            }
        };

        const speakSequential = (enText, idText, rate = 0.5) => {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utteranceEn = new SpeechSynthesisUtterance(enText);
                utteranceEn.lang = 'en-US';
                utteranceEn.rate = rate;
                
                utteranceEn.onend = () => {
                    const utteranceId = new SpeechSynthesisUtterance(idText);
                    utteranceId.lang = 'id-ID';
                    utteranceId.rate = rate;
                    window.speechSynthesis.speak(utteranceId);
                };
                window.speechSynthesis.speak(utteranceEn);
            }
        };

        // --- 1. HOME SCREEN ---
        const HomeScreen = ({ navigate, totalStars, userName }) => (
            <div className="flex flex-col gap-5 pb-6">
                <div className="flex justify-between items-center mt-2">
                    <div>
                        <h1 className="font-black text-2xl leading-none tracking-wide text-black uppercase">HAI, {userName}!</h1>
                        <div className="inline-block mt-1 bg-[#FBBF24] border-2 border-black rounded-md px-2 py-0.5 shadow-brutal-sm font-bold text-xs uppercase">
                            Level 1
                        </div>
                    </div>
                    <button onClick={() => navigate('profile')} className={`bg-[#38BDF8] px-3 py-2 font-bold flex items-center gap-1 ${btnBrutal}`}>
                        <span className="text-lg">⚙️</span> PROFIL
                    </button>
                </div>

                <div className={`bg-[#FDE047] p-5 text-center relative overflow-hidden ${boxBrutal}`}>
                    <div className="text-5xl font-black flex justify-center items-center gap-2 text-black mb-1 drop-shadow-md">
                        <span className="text-yellow-500 drop-shadow-[2px_2px_0_black]">⭐</span> {totalStars}
                    </div>
                    <p className="font-bold text-sm tracking-widest text-black/80">TOTAL BINTANGMU</p>
                    <div className="absolute -right-4 -bottom-4 text-7xl opacity-20 transform rotate-12">🌟</div>
                </div>

                <div>
                    <h2 className="font-bold text-sm text-gray-700 mb-2">MATERI PER LEVEL:</h2>
                    <div className="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                        <button className="bg-white border-2 border-black shadow-brutal-sm brutal-click rounded-full px-4 py-1 font-bold whitespace-nowrap">LEVEL 1</button>
                        <button className="bg-gray-200 border-2 border-gray-400 text-gray-500 rounded-full px-4 py-1 font-bold whitespace-nowrap cursor-not-allowed" disabled>LEVEL 2</button>
                        <button className="bg-gray-200 border-2 border-gray-400 text-gray-500 rounded-full px-4 py-1 font-bold whitespace-nowrap cursor-not-allowed" disabled>LEVEL 3</button>
                    </div>
                </div>

                <div className="grid grid-cols-2 gap-4 mt-2">
                    <div onClick={() => navigate('abjad')} className={`bg-[#7DD3FC] p-4 flex flex-col items-center justify-center text-center gap-2 ${btnBrutal}`}>
                        <span className="text-4xl bg-white rounded-full w-14 h-14 flex items-center justify-center border-2 border-black shadow-sm mb-1">🔤</span>
                        <span className="font-bold text-sm leading-tight text-black drop-shadow-[0_1px_1px_rgba(255,255,255,0.8)]">ABJAD &<br/>HURUF</span>
                    </div>
                    <div onClick={() => navigate('misi')} className={`bg-[#22D3EE] p-4 flex flex-col items-center justify-center text-center gap-2 ${btnBrutal}`}>
                        <span className="text-4xl bg-white rounded-full w-14 h-14 flex items-center justify-center border-2 border-black shadow-sm mb-1">🎯</span>
                        <span className="font-bold text-sm leading-tight text-black drop-shadow-[0_1px_1px_rgba(255,255,255,0.8)]">MISI<br/>BELAJAR</span>
                    </div>
                    <div onClick={() => navigate('kamus')} className={`bg-[#FFEDD5] p-4 flex flex-col items-center justify-center text-center gap-2 ${btnBrutal}`}>
                        <span className="text-4xl bg-white rounded-full w-14 h-14 flex items-center justify-center border-2 border-black shadow-sm mb-1">📖</span>
                        <span className="font-bold text-sm leading-tight text-black drop-shadow-[0_1px_1px_rgba(255,255,255,0.8)]">KAMUS<br/>PINTAR</span>
                    </div>
                    <div onClick={() => navigate('games')} className={`bg-[#A7F3D0] p-4 flex flex-col items-center justify-center text-center gap-2 ${btnBrutal}`}>
                        <span className="text-4xl bg-white rounded-full w-14 h-14 flex items-center justify-center border-2 border-black shadow-sm mb-1">🎪</span>
                        <span className="font-bold text-sm leading-tight text-black drop-shadow-[0_1px_1px_rgba(255,255,255,0.8)]">ZONA<br/>BERMAIN</span>
                    </div>
                </div>
            </div>
        );

        // --- 2. ABJAD & ANGKA SCREEN ---
        const AbjadScreen = ({ navigate, speechRate }) => {
            const [activeTab, setActiveTab] = useState('abjad');
            const [selectedItem, setSelectedItem] = useState(null);
            const [activeVocabIdx, setActiveVocabIdx] = useState(0);
            const [speechLanguage, setSpeechLanguage] = useState('en');

            const letters = [
                { id: 'A', bg: 'bg-rose-300', vocab: [{ word: 'Apple', mean: 'Apel', emoji: '🍎' }, { word: 'Ant', mean: 'Semut', emoji: '🐜' }, { word: 'Airplane', mean: 'Pesawat', emoji: '✈️' }] },
                { id: 'B', bg: 'bg-yellow-200', vocab: [{ word: 'Bee', mean: 'Lebah', emoji: '🐝' }, { word: 'Ball', mean: 'Bola', emoji: '⚽' }, { word: 'Banana', mean: 'Pisang', emoji: '🍌' }] },
                { id: 'C', bg: 'bg-green-200', vocab: [{ word: 'Cat', mean: 'Kucing', emoji: '🐱' }, { word: 'Car', mean: 'Mobil', emoji: '🚗' }, { word: 'Cake', mean: 'Kue', emoji: '🍰' }] },
                { id: 'D', bg: 'bg-blue-300', vocab: [{ word: 'Dog', mean: 'Anjing', emoji: '🐶' }, { word: 'Duck', mean: 'Bebek', emoji: '🦆' }, { word: 'Drum', mean: 'Drum', emoji: '🥁' }] },
                { id: 'E', bg: 'bg-indigo-200', vocab: [{ word: 'Elephant', mean: 'Gajah', emoji: '🐘' }, { word: 'Egg', mean: 'Telur', emoji: '🥚' }, { word: 'Eagle', mean: 'Elang', emoji: '🦅' }] }
            ];

            const numbers = [
                { id: '1', word: 'One', mean: 'Satu', emojiCount: '🍎', bg: 'bg-rose-200' },
                { id: '2', word: 'Two', mean: 'Dua', emojiCount: '🎈🎈', bg: 'bg-emerald-200' },
                { id: '3', word: 'Three', mean: 'Tiga', emojiCount: '🚗🚗🚗', bg: 'bg-amber-200' },
                { id: '4', word: 'Four', mean: 'Empat', emojiCount: '⭐⭐⭐⭐', bg: 'bg-indigo-200' },
                { id: '5', word: 'Five', mean: 'Lima', emojiCount: '🍀🍀🍀🍀🍀', bg: 'bg-teal-200' }
            ];

            const triggerSpeech = (item, vocabIdx, currentLang) => {
                if (activeTab === 'abjad') {
                    const currentVocab = item.vocab[vocabIdx];
                    if (currentLang === 'en') {
                        speakText(currentVocab.word, 'en-US', speechRate);
                    } else {
                        speakSequential(currentVocab.word, currentVocab.mean, speechRate);
                    }
                } else {
                    if (currentLang === 'en') {
                        speakText(`${item.word}. ${item.mean}`, 'en-US', speechRate);
                    } else {
                        speakText(`${item.mean}. ${item.word}`, 'id-ID', speechRate);
                    }
                }
            };

            const handleCardClick = (item) => {
                setSelectedItem(item);
                setActiveVocabIdx(0);
                triggerSpeech(item, 0, speechLanguage);
            };

            return (
                <div className="flex flex-col gap-4 pb-6 relative pt-2">
                    <button onClick={() => navigate('home')} className={`self-start bg-white px-3 py-1.5 text-sm font-bold flex items-center gap-1 ${btnBrutal}`}>
                        <span>⬅️</span> Menu Utama
                    </button>

                    <div className="flex gap-2 mt-2">
                        <button onClick={() => { setActiveTab('abjad'); setSelectedItem(null); }} className={`flex-1 py-2 text-center font-black ${activeTab === 'abjad' ? 'bg-[#FDE047]' : 'bg-white'} ${btnBrutal}`}>Abjad 🔤</button>
                        <button onClick={() => { setActiveTab('angka'); setSelectedItem(null); }} className={`flex-1 py-2 text-center font-black ${activeTab === 'angka' ? 'bg-[#FDE047]' : 'bg-white'} ${btnBrutal}`}>Angka 🔢</button>
                    </div>

                    <div className="bg-yellow-100 border-2 border-black rounded-lg py-2 px-3 text-center font-semibold text-sm">
                        Menampilkan materi dasar ✨
                    </div>

                    <div className="flex-1 overflow-y-auto pr-1 pb-10" style={{ maxHeight: '520px' }}>
                        <div className="grid grid-cols-2 gap-4">
                            {(activeTab === 'abjad' ? letters : numbers).map(item => (
                                <div key={item.id} onClick={() => handleCardClick(item)} className={`${item.bg} p-4 flex flex-col items-center justify-center text-center ${boxBrutal} brutal-click cursor-pointer`}>
                                    <div className="text-6xl font-black mb-1 drop-shadow-md text-white border-text-black" style={{ WebkitTextStroke: '2px black' }}>{item.id}</div>
                                    <div className="text-[11px] font-semibold text-black/80 mt-1">Ketuk untuk<br/>belajar!</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {selectedItem && (
                        <div className="absolute inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white brutal-border shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] rounded-3xl w-full max-w-[320px] p-5 flex flex-col items-center text-center gap-3.5 animate-in fade-in zoom-in duration-200">
                                
                                <div className="w-full flex flex-col gap-1">
                                    <span className="text-[10px] font-bold text-gray-500 uppercase text-left tracking-wider">SUARA BAHASA:</span>
                                    <div className="flex gap-1.5 w-full bg-gray-100 p-1.5 border-2 border-black rounded-xl">
                                        <button onClick={() => { setSpeechLanguage('en'); triggerSpeech(selectedItem, activeVocabIdx, 'en'); }} className={`flex-1 py-1 text-xs font-black rounded-lg transition-all ${speechLanguage === 'en' ? 'bg-[#38BDF8] text-white border-2 border-black' : 'text-gray-500'}`}>🇺🇸 ENGLISH</button>
                                        <button onClick={() => { setSpeechLanguage('id'); triggerSpeech(selectedItem, activeVocabIdx, 'id'); }} className={`flex-1 py-1 text-xs font-black rounded-lg transition-all ${speechLanguage === 'id' ? 'bg-[#FBBF24] text-black border-2 border-black' : 'text-gray-500'}`}>🇮🇩 INDONESIA</button>
                                    </div>
                                </div>

                                <div className="w-16 h-16 rounded-2xl bg-sky-100 border-4 border-black flex items-center justify-center shadow-brutal-sm">
                                    <span className="text-4xl font-black">{selectedItem.id}</span>
                                </div>

                                <div>
                                    <p className="text-2xl font-black text-blue-600 leading-tight">
                                        {activeTab === 'abjad' ? selectedItem.vocab[activeVocabIdx].word : (speechLanguage === 'en' ? `${selectedItem.word} / ${selectedItem.mean}` : `${selectedItem.mean} / ${selectedItem.word}`)}
                                    </p>
                                    {activeTab === 'abjad' && <p className="text-sm font-semibold text-gray-600">= {selectedItem.vocab[activeVocabIdx].mean}</p>}
                                </div>

                                <div className="bg-orange-50 border-2 border-black p-3 rounded-xl w-full min-h-[55px] flex items-center justify-center">
                                    <span className={activeTab === 'abjad' ? "text-4xl animate-bounce" : "text-xl font-bold"}>
                                        {activeTab === 'abjad' ? selectedItem.vocab[activeVocabIdx].emoji : selectedItem.emojiCount}
                                    </span>
                                </div>

                                {activeTab === 'abjad' && (
                                    <div className="flex gap-1 w-full justify-center mt-1">
                                        {selectedItem.vocab.map((v, idx) => (
                                            <button key={idx} onClick={() => { setActiveVocabIdx(idx); triggerSpeech(selectedItem, idx, speechLanguage); }} className={`p-2 text-xl font-bold border-2 border-black rounded-lg shadow-brutal-sm brutal-click ${activeVocabIdx === idx ? 'bg-[#A7F3D0]' : 'bg-white'}`}>
                                                {v.emoji}
                                            </button>
                                        ))}
                                    </div>
                                )}

                                <div className="flex gap-2 w-full mt-2">
                                    <button onClick={() => triggerSpeech(selectedItem, activeVocabIdx, speechLanguage)} className="flex-1 bg-green-400 py-2 font-bold border-2 border-black shadow-brutal-sm brutal-click rounded-xl">🔊 SUARA</button>
                                    <button onClick={() => setSelectedItem(null)} className="bg-rose-300 px-4 py-2 font-bold border-2 border-black shadow-brutal-sm brutal-click rounded-xl">TUTUP</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- 3. ZONA BERMAIN SCREEN ---
        const GamesScreen = ({ navigate, addStars, speechRate, kamusData }) => {
            const [activeGame, setActiveGame] = useState(null);
            const [gameLanguage, setGameLanguage] = useState('en');
            
            // Memory Match State
            const [memoryDifficulty, setMemoryDifficulty] = useState(null);
            const [memoryCards, setMemoryCards] = useState([]);
            const [flippedIndices, setFlippedIndices] = useState([]);
            const [matchedPairs, setMatchedPairs] = useState([]);
            const [gameWon, setGameWon] = useState(false);

            const startMemoryGame = (diff) => {
                setMemoryDifficulty(diff);
                const numPairs = diff === 'easy' ? 4 : diff === 'medium' ? 6 : diff === 'hard' ? 8 : 16;
                
                // MURNI DARI KAMUS & BEBAS DARI "Kombinasi Kata"
                const sourceKamus = (kamusData && kamusData.length > 0 ? kamusData : getKamusData())
                    .filter(item => item.topic !== 'Kombinasi Kata 🔀');
                
                const shuffledKamus = [...sourceKamus].sort(() => Math.random() - 0.5);
                const selectedPairs = shuffledKamus.slice(0, numPairs);
                
                const cardsList = [];
                selectedPairs.forEach((pair, idx) => {
                    cardsList.push({ id: `t-${idx}-${pair.word}`, type: 'text', val: pair.word, matchId: pair.word });
                    cardsList.push({ id: `e-${idx}-${pair.word}`, type: 'emoji', val: pair.emoji, matchId: pair.word });
                });

                setMemoryCards(cardsList.sort(() => Math.random() - 0.5));
                setFlippedIndices([]);
                setMatchedPairs([]);
                setGameWon(false);
                setActiveGame('memory');
                speakText("Let's play game memory match", 'en-US', speechRate);
            };

            const handleCardClick = (idx) => {
                if (flippedIndices.length === 2 || matchedPairs.includes(idx) || flippedIndices.includes(idx)) return;
                
                const newFlipped = [...flippedIndices, idx];
                setFlippedIndices(newFlipped);

                if (newFlipped.length === 2) {
                    const firstCard = memoryCards[newFlipped[0]];
                    const secondCard = memoryCards[newFlipped[1]];

                    if (firstCard.matchId === secondCard.matchId) {
                        setMatchedPairs(prev => [...prev, newFlipped[0], newFlipped[1]]);
                        setFlippedIndices([]);
                        speakText(firstCard.type === 'text' ? firstCard.val : secondCard.val, 'en-US', speechRate);
                        
                        if (matchedPairs.length + 2 === memoryCards.length) {
                            setGameWon(true);
                            const starRewards = memoryDifficulty === 'easy' ? 10 : memoryDifficulty === 'medium' ? 20 : memoryDifficulty === 'hard' ? 30 : 50;
                            addStars(starRewards); 
                        }
                    } else {
                        setTimeout(() => { setFlippedIndices([]); }, 1000);
                    }
                }
            };

            // Pop Balloon State
            const [balloonQuestion, setBalloonQuestion] = useState({ word: 'Cat', answer: 'Kucing', mean: 'Kucing' });
            const [balloons, setBalloons] = useState([]);
            const [balloonWin, setBalloonWin] = useState(false);

            const startBalloonGame = (selectedLang = gameLanguage) => {
                // MURNI DARI KAMUS & BEBAS DARI "Kombinasi Kata"
                const sourceKamus = (kamusData && kamusData.length > 0 ? kamusData : getKamusData())
                    .filter(item => item.topic !== 'Kombinasi Kata 🔀');
                
                const shuffledKamus = [...sourceKamus].sort(() => Math.random() - 0.5);
                const randQ = shuffledKamus[0];
                
                if (selectedLang === 'en') {
                    setBalloonQuestion({ word: randQ.word, answer: randQ.mean });
                } else {
                    setBalloonQuestion({ word: randQ.mean, answer: randQ.word });
                }

                const opts = selectedLang === 'en' 
                    ? [randQ.mean, shuffledKamus[1].mean, shuffledKamus[2].mean].sort(() => Math.random() - 0.5)
                    : [randQ.word, shuffledKamus[1].word, shuffledKamus[2].word].sort(() => Math.random() - 0.5);
                
                const colors = ['bg-rose-400', 'bg-sky-400', 'bg-yellow-400', 'bg-purple-400', 'bg-lime-400'].sort(() => Math.random() - 0.5);
                const leftPositions = ['15%', '42%', '68%'].sort(() => Math.random() - 0.5);

                const generatedBalloons = opts.slice(0, 3).map((opt, i) => ({
                    id: i, text: opt, color: colors[i], left: leftPositions[i], animClass: `float-balloon-${i}`
                }));

                setBalloons(generatedBalloons);
                setBalloonWin(false);
                setActiveGame('balloon');
                speakText(selectedLang === 'en' ? randQ.word : randQ.mean, selectedLang === 'en' ? 'en-US' : 'id-ID', speechRate);
            };

            const handlePop = (balloon) => {
                if (balloon.text === balloonQuestion.answer) {
                    speakText(balloon.text, gameLanguage === 'en' ? 'id-ID' : 'en-US', speechRate);
                    setBalloonWin(true);
                    addStars(15);
                } else {
                    speakText("Try again", 'en-US', speechRate);
                }
            };

            return (
                <div className="flex flex-col gap-4 pb-6 relative pt-2">
                    {activeGame === null ? (
                        <>
                            <button onClick={() => navigate('home')} className={`self-start bg-white px-3 py-1.5 text-sm font-bold flex items-center gap-1 ${btnBrutal}`}>
                                <span>⬅️</span> Menu Utama
                            </button>
                            <div className={`bg-[#A7F3D0] p-5 text-center flex flex-col items-center gap-2 mt-2 ${boxBrutal}`}>
                                <div className="text-5xl drop-shadow-md animate-bounce">🎪</div>
                                <h2 className="font-black text-2xl text-black">ZONA BERMAIN</h2>
                                <p className="font-semibold text-sm">Mainkan game, raih banyak bintang!</p>
                            </div>
                            <div className="flex flex-col gap-3 mt-2">
                                <div className="bg-white p-3 flex justify-between items-center brutal-border-sm shadow-brutal-sm rounded-xl">
                                    <div className="flex items-center gap-3">
                                        <div className="text-3xl bg-pink-100 w-12 h-12 flex items-center justify-center rounded-lg border-2 border-black">🃏</div>
                                        <div>
                                            <h3 className="font-bold text-base leading-tight">Memory Match</h3>
                                            <p className="text-[11px] font-medium text-gray-600 leading-tight mt-0.5">Mencocokkan kata & emoji</p>
                                        </div>
                                    </div>

                                            <button onClick={() => generateKuis(1)} className="bg-sky-200 p-4 border-3 border-black shadow-brutal-sm rounded-xl font-bold brutal-click flex flex-col gap-1 text-left"><span className="text-base font-black">Tipe 1: Tebak Musim Bulan 🌦️</span><span className="text-[11px] text-gray-600">Hujan atau Panas Kemarau?</span></button>
                                            <button onClick={() => generateKuis(2)} className="bg-yellow-200 p-4 border-3 border-black shadow-brutal-sm rounded-xl font-bold brutal-click flex flex-col gap-1 text-left"><span className="text-base font-black">Tipe 2: Angka Ke Nama Bulan 🗓️</span><span className="text-[11px] text-gray-600">Bulan ke-X itu apa?</span></button>
                                            <button onClick={() => generateKuis(3)} className="bg-rose-200 p-4 border-3 border-black shadow-brutal-sm rounded-xl font-bold brutal-click flex flex-col gap-1 text-left"><span className="text-base font-black">Tipe 3: Nama Bulan Ke Angka 🔢</span><span className="text-[11px] text-gray-600">Urutan bulan keberapa?</span></button>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-4 mt-2">
                                            <div className="bg-yellow-100 border-3 border-black p-5 text-center rounded-2xl shadow-brutal-sm relative">
                                                <span className="text-[10px] font-black uppercase text-gray-400 block tracking-widest">PERTANYAAN:</span>
                                                {kuisType === 1 && <p className="text-2xl font-black text-indigo-900 mt-2 uppercase">Bulan {currentQ.id} ({currentQ.en}) masuk musim apa?</p>}
                                                {kuisType === 2 && <p className="text-2xl font-black text-indigo-900 mt-2 uppercase">Apakah nama bulan urutan ke-{currentQ.num}?</p>}
                                                {kuisType === 3 && <p className="text-2xl font-black text-indigo-900 mt-2 uppercase">Bulan {currentQ.id} ({currentQ.en}) adalah bulan ke berapa?</p>}
                                            </div>
                                            <div className="flex flex-col gap-3 mt-2">
                                                {answersOptions.map((ans, idx) => (
                                                    <button key={idx} onClick={() => handleAnswer(ans)} className="bg-white p-4 font-black border-3 border-black shadow-brutal-sm rounded-xl text-base brutal-click">
                                                        {kuisType === 1 ? ans : kuisType === 2 ? `${ans.en} (${ans.id})` : `Bulan Ke-${ans.num}`}
                                                    </button>
                                                ))}
                                            </div>
                                            {feedback && (
                                                <div className={`p-4 text-center border-3 border-black shadow-brutal-sm rounded-xl font-black ${feedback === 'correct' ? 'bg-emerald-300' : 'bg-rose-300'}`}>
                                                    {feedback === 'correct' ? (
                                                        <div className="flex flex-col items-center gap-1">
                                                            <span className="text-3xl">🎉 HEBAT!</span>
                                                            <button onClick={() => generateKuis(kuisType)} className="mt-2 bg-white px-4 py-1.5 rounded-lg border-2 border-black text-xs font-black">SOAL BERIKUTNYA ➔</button>
                                                        </div>
                                                    ) : (
                                                        <div><span className="text-lg">❌ COBA LAGI!</span></div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- 6. PROFIL MENU SCREEN ---
        const ProfileScreen = ({ navigate, totalStars, resetStars, userName, setUserName, speechRate, setSpeechRate }) => {
            const [inputName, setInputName] = useState(userName);
            const [showResetModal, setShowResetModal] = useState(false);

            const saveProfile = () => {
                if (inputName.trim() === '') { alert("Nama tidak boleh kosong!"); return; }
                setUserName(inputName);
                navigate('home');
            };

            const confirmReset = () => {
                resetStars();
                setShowResetModal(false);
                speakText("Stars reset to zero", 'en-US', speechRate);
            };

            return (
                <div className="flex flex-col gap-4 pb-6 relative">
                    <button onClick={() => navigate('home')} className={`self-start bg-white px-3 py-1.5 text-sm font-bold flex items-center gap-1 ${btnBrutal}`}>
                        <span>⬅️</span> Menu Utama
                    </button>

                    <div className={`bg-[#38BDF8] p-5 text-center flex flex-col items-center gap-2 mt-2 ${boxBrutal}`}>
                        <div className="text-5xl drop-shadow-md">⚙️</div>
                        <h2 className="font-black text-2xl text-black">PENGATURAN PROFIL</h2>
                        <p className="font-semibold text-sm text-black/85">Atur profil belajarmu di sini</p>
                    </div>

                    <div className="bg-white p-5 brutal-border shadow-brutal rounded-2xl flex flex-col gap-3 mt-2">
                        <label className="text-xs font-black text-gray-700 uppercase tracking-wider block text-left">Nama Profil Kamu:</label>
                        <input type="text" value={inputName} onChange={(e) => setInputName(e.target.value)} placeholder="Tulis namamu disini..." className="w-full p-3 font-bold border-3 border-black rounded-xl outline-none" />
                    </div>

                    <div className="bg-white p-5 brutal-border shadow-brutal rounded-2xl flex flex-col gap-3">
                        <label className="text-xs font-black text-gray-700 uppercase tracking-wider block text-left">Kecepatan Suara: 🗣️</label>
                        <div className="grid grid-cols-3 gap-2 mt-1">
                            <button onClick={() => {setSpeechRate(0.25); speakText("test", 'en-US', 0.25);}} className={`py-2 text-xs font-black rounded-xl border-2 border-black transition-all brutal-click ${speechRate === 0.25 ? 'bg-orange-300 shadow-brutal-sm' : 'bg-white'}`}>Siput 🐌 (0.25x)</button>
                            <button onClick={() => {setSpeechRate(0.5); speakText("test", 'en-US', 0.5);}} className={`py-2 text-xs font-black rounded-xl border-2 border-black transition-all brutal-click ${speechRate === 0.5 ? 'bg-yellow-300 shadow-brutal-sm' : 'bg-white'}`}>Kura 🐢 (0.5x)</button>
                            <button onClick={() => {setSpeechRate(1.0); speakText("test", 'en-US', 1.0);}} className={`py-2 text-xs font-black rounded-xl border-2 border-black transition-all brutal-click ${speechRate === 1.0 ? 'bg-green-300 shadow-brutal-sm' : 'bg-white'}`}>Kelinci 🐇 (1x)</button>
                        </div>
                    </div>

                    <div className="bg-[#FFF8EA] p-4 brutal-border shadow-brutal rounded-2xl flex flex-col gap-2">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <span className="text-2xl">⭐</span>
                                <div className="text-left">
                                    <p className="text-[10px] font-bold text-gray-500 uppercase leading-tight">Total Bintang</p>
                                    <p className="text-lg font-black text-black leading-tight">{totalStars} Bintang</p>
                                </div>
                            </div>
                            <button onClick={() => setShowResetModal(true)} className="bg-rose-200 hover:bg-rose-300 px-2.5 py-1.5 font-bold text-[10px] border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] rounded-lg brutal-click text-rose-900 flex items-center gap-1 shrink-0"><span>🗑️</span> Reset</button>
                        </div>
                    </div>

                    <button onClick={saveProfile} className="w-full py-4 mt-2 bg-green-400 font-black text-lg border-3 border-black shadow-brutal rounded-xl brutal-click">💾 SIMPAN PERUBAHAN</button>

                    {showResetModal && (
                        <div className="absolute inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white brutal-border shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] rounded-3xl w-full max-w-[300px] p-5 flex flex-col items-center text-center gap-4 animate-in fade-in zoom-in duration-200">
                                <div className="text-4xl">⚠️</div>
                                <div><h4 className="font-black text-xl text-black">Hapus Bintang?</h4><p className="text-xs font-medium text-gray-600 mt-1">Yakin mereset bintang menjadi nol?</p></div>
                                <div className="flex gap-2 w-full mt-2">
                                    <button onClick={confirmReset} className="flex-1 bg-rose-400 py-2 font-black text-xs border-2 border-black shadow-brutal-sm brutal-click rounded-lg text-rose-950">YA, HAPUS</button>
                                    <button onClick={() => setShowResetModal(false)} className="flex-1 bg-gray-200 py-2 font-black text-xs border-2 border-black shadow-brutal-sm brutal-click rounded-lg text-gray-700">BATAL</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [currentScreen, setCurrentScreen] = useState('home');
            const [totalStars, setTotalStars] = useState(() => {
                const savedStars = localStorage.getItem('eb_stars');
                return savedStars !== null ? parseInt(savedStars, 10) : 0;
            });
            const [userName, setUserName] = useState(() => {
                const savedName = localStorage.getItem('eb_username');
                return savedName !== null ? savedName : '';
            });
            const [speechRate, setSpeechRate] = useState(() => {
                const savedRate = localStorage.getItem('eb_speech_rate');
                return savedRate !== null ? parseFloat(savedRate) : 0.5;
            });

            const [kamusData, setKamusData] = useState([]);
            const [isLoadingKamus, setIsLoadingKamus] = useState(true);
            const [loadingProgress, setLoadingProgress] = useState(0); 
            const [showOnboarding, setShowOnboarding] = useState(false);
            const [tempName, setTempName] = useState('');
            const [isUsingExternal, setIsUsingExternal] = useState(false);

            useEffect(() => {
                let checkTimer;
                checkTimer = setInterval(() => {
                    const loadedExternal = window.JJ_Kamus_Lengkap && window.JJ_Kamus_Lengkap.length > 100;
                    
                    setLoadingProgress((currentProgress) => {
                        const nextProgress = currentProgress + 10;
                        if (nextProgress >= 100 || loadedExternal) {
                            clearInterval(checkTimer);
                            if (loadedExternal) {
                                setKamusData(window.JJ_Kamus_Lengkap);
                                setIsUsingExternal(true);
                            } else {
                                setKamusData(getKamusData());
                                setIsUsingExternal(false);
                            }
                            setIsLoadingKamus(false);
                            return 100;
                        }
                        return nextProgress;
                    });
                }, 100);

                return () => clearInterval(checkTimer);
            }, []);

            useEffect(() => {
                if (!isLoadingKamus) {
                    if (userName !== '') {
                        localStorage.setItem('eb_username', userName);
                        setShowOnboarding(false);
                    } else {
                        setShowOnboarding(true);
                    }
                }
            }, [userName, isLoadingKamus]);

            useEffect(() => { localStorage.setItem('eb_stars', totalStars.toString()); }, [totalStars]);
            useEffect(() => { localStorage.setItem('eb_speech_rate', speechRate.toString()); }, [speechRate]);

            const addStars = (amount) => { setTotalStars(prev => prev + amount); };
            const resetStars = () => { setTotalStars(0); };

            const handleOnboardingSubmit = () => {
                if (tempName.trim() === '') { alert("Tulis namamu dulu ya!"); return; }
                setUserName(tempName.trim());
                setTotalStars(0); 
                speakText(`Hello, ${tempName.trim()}! Welcome to JJ Kids!`, 'en-US', speechRate);
            };

            const renderScreen = () => {
                switch(currentScreen) {
                    case 'abjad': return <AbjadScreen navigate={setCurrentScreen} speechRate={speechRate} />;
                    case 'games': return <GamesScreen navigate={setCurrentScreen} addStars={addStars} speechRate={speechRate} kamusData={kamusData} />;
                    case 'kamus': return <KamusScreen navigate={setCurrentScreen} speechRate={speechRate} kamusData={kamusData} />;
                    case 'misi': return <MisiScreen navigate={setCurrentScreen} addStars={addStars} speechRate={speechRate} />;
                    case 'profile': return (
                        <ProfileScreen navigate={setCurrentScreen} totalStars={totalStars} resetStars={resetStars} userName={userName} setUserName={setUserName} speechRate={speechRate} setSpeechRate={setSpeechRate} />
                    );
                    case 'home':
                    default: return <HomeScreen navigate={setCurrentScreen} totalStars={totalStars} userName={userName} />;
                }
            };

            if (isLoadingKamus) {
                return (
                    <div className="w-full max-w-[390px] h-[844px] max-h-[95vh] bg-[#FDE047] border-[6px] border-black rounded-[32px] shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] flex flex-col items-center justify-center p-6 text-center relative overflow-hidden">
                        <div className="text-7xl animate-bounce mb-6">📖</div>
                        <h3 className="font-black text-2xl text-black leading-none uppercase">JJ KIDS</h3>
                        <div className="w-48 bg-white border-[3px] border-black h-6 rounded-full overflow-hidden mt-6 shadow-brutal-sm relative">
                            <div className="bg-green-400 h-full border-r-[3px] border-black transition-all duration-100 ease-out" style={{ width: `${loadingProgress}%` }}></div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="w-full max-w-[390px] h-[844px] max-h-[95vh] bg-dot-pattern border-[6px] border-black rounded-[32px] shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] relative overflow-hidden flex flex-col">
                    <div className="h-6 w-full bg-white/50 backdrop-blur-sm sticky top-0 z-50 flex justify-between px-6 pt-1 text-[10px] font-bold">
                        <span>9:41</span><div className="flex gap-1"><span>📶</span><span>🔋</span></div>
                    </div>

                    <div className="flex-1 overflow-y-auto no-scrollbar p-5 relative z-10">
                        {renderScreen()}
                    </div>

                    {/* Indikator Sumber Data */}
                    <div className="absolute bottom-2 right-4 text-[9px] font-black z-50 pointer-events-none select-none px-1.5 py-0.5 rounded opacity-50 bg-white border border-gray-300">
                        {isUsingExternal ? "A dari kamus.js" : "A dari internal"}
                    </div>

                    {showOnboarding && (
                        <div className="absolute inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-5">
                            <div className="bg-white brutal-border shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] rounded-3xl w-full p-6 flex flex-col items-center text-center gap-4 animate-in fade-in zoom-in duration-200">
                                <div className="text-6xl animate-bounce">🦖</div>
                                <div><h3 className="font-black text-2xl text-black leading-tight">SELAMAT DATANG!</h3><p className="text-xs font-bold text-gray-500 mt-1 uppercase tracking-wider">Di JJ Kids</p></div>
                                <div className="bg-blue-50 border-2 border-black p-3.5 rounded-xl w-full"><p className="text-xs font-bold text-blue-950">Ayo tulis namamu di bawah ini untuk memulai belajar seru dengan 0 bintang!</p></div>
                                <div className="w-full text-left">
                                    <label className="text-[10px] font-black text-gray-600 block mb-1 uppercase tracking-wider">Siapa Namamu?</label>
                                    <input type="text" value={tempName} onChange={(e) => setTempName(e.target.value)} placeholder="Ketik nama kecilmu..." className="w-full p-3 font-bold text-base border-3 border-black rounded-xl outline-none shadow-brutal-sm" />
                                </div>
                                <button onClick={handleOnboardingSubmit} className="w-full py-4 mt-2 bg-[#FDE047] font-black text-lg border-3 border-black shadow-brutal rounded-xl brutal-click">MULAI PETUALANGAN! 🚀</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
