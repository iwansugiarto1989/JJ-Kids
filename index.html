            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Hentikan suara sebelumnya jika ada
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = langCode; 
                utterance.rate = rate; 
                window.speechSynthesis.speak(utterance);
            }
        };

                window.speechSynthesis.cancel();
                
                const utteranceEn = new SpeechSynthesisUtterance(enText);
                utteranceEn.lang = 'en-US';
                utteranceEn.rate = rate;
                
                utteranceEn.onend = () => {
                    const utteranceId = new SpeechSynthesisUtterance(idText);
                    utteranceId.lang = 'id-ID';
                    utteranceId.rate = rate;

                { id: '8', word: 'Eight', mean: 'Delapan', emojiCount: '🧸🧸🧸🧸...🧸', bg: 'bg-purple-200' },

            // Pengucapan interaktif: Angka bilingual & Abjad EN/ID

                    if (currentLang === 'en') {

                                                >

                                    >
                                        🔊 SUARA
                                    </button>
                                    <button 
                                        onClick={() => setSelectedItem(null)}
                                        className="bg-rose-300 px-4 py-2 font-bold text-black border-2 border-black shadow-brutal-sm brutal-click rounded-xl"

                                </div>

                            </div>
                        </div>
                    )}

                </div>
            );
        };

        // 3. ZONA BERMAIN SCREEN (INTERACTIVE GAMES ENABLED & RE-STYLIZED!)
        const GamesScreen = ({ navigate, addStars, speechRate }) => {
            const [activeGame, setActiveGame] = useState(null); // 'memory' atau 'balloon' or null
            const [gameLanguage, setGameLanguage] = useState('en'); // 'en' atau 'id' untuk Pop Balloon
            
            // --- GAME 1: MEMORY MATCH LOGIC ---
            const [memoryDifficulty, setMemoryDifficulty] = useState(null); // 'easy', 'medium', 'hard' atau null
            const [memoryCards, setMemoryCards] = useState([]);
            const [flippedIndices, setFlippedIndices] = useState([]);
            const [matchedPairs, setMatchedPairs] = useState([]);
            const [gameWon, setGameWon] = useState(false);

            // Pool Kosa Kata Memory Match yang Berlimpah & Edukatif
            const memoryPairsPool = [
                { text: 'Cat', emoji: '🐱', matchId: 'C' },
                { text: 'Apple', emoji: '🍎', matchId: 'A' },
                { text: 'Dog', emoji: '🐶', matchId: 'D' },
                { text: 'Ball', emoji: '⚽', matchId: 'B' },
                { text: 'Banana', emoji: '🍌', matchId: 'Ba' },
                { text: 'Car', emoji: '🚗', matchId: 'Ca' },
                { text: 'Book', emoji: '📖', matchId: 'Bo' },
                { text: 'Sun', emoji: '☀️', matchId: 'S' }
            ];

            const startMemoryGame = (diff) => {
                setMemoryDifficulty(diff);
                
                // Tentukan jumlah pasang berdasarkan tingkat kesulitan
                // Easy: 8 Kartu (4 pasang), Medium: 12 Kartu (6 pasang), Hard: 16 Kartu (8 pasang)
                const numPairs = diff === 'easy' ? 4 : diff === 'medium' ? 6 : 8;
                
                // Ambil pasang acak dari pool kosa kata
                const selectedPairs = [...memoryPairsPool].sort(() => Math.random() - 0.5).slice(0, numPairs);
                
                const cardsList = [];
                selectedPairs.forEach((pair, idx) => {
                    cardsList.push({ id: `t-${idx}-${pair.matchId}`, type: 'text', val: pair.text, matchId: pair.matchId });
                    cardsList.push({ id: `e-${idx}-${pair.matchId}`, type: 'emoji', val: pair.emoji, matchId: pair.matchId });
                });

                // Acak seluruh kartu yang telah dikumpulkan
                const shuffled = cardsList.sort(() => Math.random() - 0.5);
                setMemoryCards(shuffled);
                setFlippedIndices([]);
                setMatchedPairs([]);
                setGameWon(false);
                setActiveGame('memory');
                speakText("Let's play game memory match", 'en-US', speechRate);
            };

            const handleCardClick = (idx) => {
                if (flippedIndices.length === 2 || matchedPairs.includes(idx) || flippedIndices.includes(idx)) return;
                
                const newFlipped = [...flippedIndices, idx];
                setFlippedIndices(newFlipped);

                // Jika sudah membalik 2 kartu, cek kecocokan
                if (newFlipped.length === 2) {
                    const firstCard = memoryCards[newFlipped[0]];
                    const secondCard = memoryCards[newFlipped[1]];

                    if (firstCard.matchId === secondCard.matchId) {
                        setMatchedPairs(prev => [...prev, newFlipped[0], newFlipped[1]]);
                        setFlippedIndices([]);
                        speakText(firstCard.type === 'text' ? firstCard.val : secondCard.val, 'en-US', speechRate);
                        
                        // Cek kemenangan
                        if (matchedPairs.length + 2 === memoryCards.length) {
                            setGameWon(true);
                            // Sesuaikan jumlah bintang berdasarkan tingkat kesulitan
                            const starRewards = memoryDifficulty === 'easy' ? 10 : memoryDifficulty === 'medium' ? 20 : 30;
                            addStars(starRewards); 
                        }
                    } else {
                        // Tutup kartu lagi setelah delay
                        setTimeout(() => {
                            setFlippedIndices([]);
                        }, 1000);
                    }
                }
            };

            // --- GAME 2: POP BALLOON LOGIC ---
            const [balloonQuestion, setBalloonQuestion] = useState({ word: 'Monkey', answer: 'Monyet', mean: 'Monyet' });
            const [balloons, setBalloons] = useState([]);
            const [balloonWin, setBalloonWin] = useState(false);

            const startBalloonGame = (selectedLang = gameLanguage) => {
                const words = [
                    { word: 'Monkey', options: ['Monyet', 'Kucing', 'Sapi'], mean: 'Monyet' },
                    { word: 'Banana', options: ['Pisang', 'Apel', 'Jeruk'], mean: 'Pisang' },
                    { word: 'House', options: ['Rumah', 'Buku', 'Mobil'], mean: 'Rumah' },
                    { word: 'Watermelon', options: ['Semangka', 'Anggur', 'Ikan'], mean: 'Semangka' },
                    { word: 'Cat', options: ['Kucing', 'Kuda', 'Lebah'], mean: 'Kucing' },
                    { word: 'Butterfly', options: ['Kupu-kupu', 'Semut', 'Kelinci'], mean: 'Kupu-kupu' }
                ];
                // Ambil pertanyaan acak
                const randQ = words[Math.floor(Math.random() * words.length)];
                
                // Setel format tanya jawab sesuai bahasa terpilih
                if (selectedLang === 'en') {
                    setBalloonQuestion({ word: randQ.word, answer: randQ.mean });
                } else {
                    setBalloonQuestion({ word: randQ.mean, answer: randQ.word });
                }

                // Acak urutan jawaban balon
                const opts = selectedLang === 'en' ? randQ.options : [randQ.word, 'Cat', 'Ball'].sort(() => Math.random() - 0.5);
                
                // Acak warna dan acak urutan posisi kiri agar posisi balon tidak selalu sama
                const colors = ['bg-rose-400', 'bg-sky-400', 'bg-yellow-400', 'bg-purple-400', 'bg-lime-400'].sort(() => Math.random() - 0.5);
                const leftPositions = ['15%', '42%', '68%'].sort(() => Math.random() - 0.5);

                const generatedBalloons = opts.slice(0, 3).map((opt, i) => {
                    return {
                        id: i,
                        text: opt,
                        color: colors[i],
                        left: leftPositions[i],
                        animClass: `float-balloon-${i}` // Menggunakan delay staggered
                    };
                });

                setBalloons(generatedBalloons);
                setBalloonWin(false);
                setActiveGame('balloon');
                
                // Hanya menyebutkan nama katanya saja
                if (selectedLang === 'en') {
                    speakText(randQ.word, 'en-US', speechRate);
                } else {
                    speakText(randQ.mean, 'id-ID', speechRate);
                }
            };

            const handlePop = (balloon) => {
                if (balloon.text === balloonQuestion.answer) {
                    if (gameLanguage === 'en') {
                        speakText(balloon.text, 'id-ID', speechRate); // Ucapkan jawaban Indonesia
                    } else {
                        speakText(balloon.text, 'en-US', speechRate); // Ucapkan jawaban Inggris
                    }
                    setBalloonWin(true);
                    addStars(15); // Tambah 15 Bintang!
                } else {
                    speakText("Try again", 'en-US', speechRate);
                    alert("Aduh! Cari balon dengan arti kata yang tepat ya! 🎈");
                }
            };

            return (
                <div className="flex flex-col gap-4 pb-6 relative">
                    {activeGame === null ? (
                        /* TAMPILAN LIST GAME UTAMA */
                        <>
                            <button onClick={() => navigate('home')} className={`self-start bg-white px-3 py-1.5 text-sm font-bold flex items-center gap-1 ${btnBrutal}`}>
                                <span>⬅️</span> Menu Utama
                            </button>

                            {/* Hero Banner */}
                            <div className={`bg-[#A7F3D0] p-5 text-center flex flex-col items-center gap-2 mt-2 ${boxBrutal}`}>
                                <div className="text-5xl drop-shadow-md animate-bounce">🎪</div>
                                <h2 className="font-black text-2xl text-black">ZONA BERMAIN</h2>
                                <p className="font-semibold text-sm">Mainkan game, raih banyak bintang!</p>
                            </div>

                            {/* Game List */}
                            <div className="flex flex-col gap-3 mt-2">
                                {/* Game 1 */}
                                <div className="bg-white p-3 flex justify-between items-center brutal-border-sm shadow-brutal-sm rounded-xl">
                                    <div className="flex items-center gap-3">
                                        <div className="text-3xl bg-pink-100 w-12 h-12 flex items-center justify-center rounded-lg border-2 border-black">🃏</div>
                                        <div>
                                            <h3 className="font-bold text-base leading-tight">Memory Match</h3>
                                            <p className="text-[11px] font-medium text-gray-600 leading-tight mt-0.5">Mencocokkan kata & gambar emoji</p>
                                        </div>
                                    </div>
                                    <button onClick={() => { setActiveGame('memory'); setMemoryDifficulty(null); }} className="bg-[#FBBF24] w-10 h-10 flex items-center justify-center rounded-full text-xl pl-1 border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] brutal-click">
                                        ▶️
                                    </button>
                                </div>

                                {/* Game 2 */}
                                <div className="bg-white p-3 flex justify-between items-center brutal-border-sm shadow-brutal-sm rounded-xl">
                                    <div className="flex items-center gap-3">
                                        <div className="text-3xl bg-sky-100 w-12 h-12 flex items-center justify-center rounded-lg border-2 border-black">🎈</div>
                                        <div>
                                            <h3 className="font-bold text-base leading-tight">Pop Balloon</h3>
                                            <p className="text-[11px] font-medium text-gray-600 leading-tight mt-0.5">Letuskan arti kata pada balon terbang!</p>
                                        </div>
                                    </div>
                                    <button onClick={() => startBalloonGame(gameLanguage)} className="bg-[#FBBF24] w-10 h-10 flex items-center justify-center rounded-full text-xl pl-1 border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] brutal-click">
                                        ▶️
                                    </button>
                                </div>
                            </div>
                        </>
                    ) : activeGame === 'memory' ? (
                        /* GAME INTERAKTIF 1: MEMORY MATCH */
                        <div className="flex flex-col items-center gap-4">
                            <div className="flex justify-between items-center w-full">
                                <span className="text-xs font-bold bg-white px-2 py-1 rounded border-2 border-black shadow-brutal-sm uppercase">Memory Match: {memoryDifficulty ? memoryDifficulty : 'Pilih Level'}</span>
                                <button onClick={() => { setActiveGame(null); setMemoryDifficulty(null); }} className="text-xs bg-rose-300 font-bold border-2 border-black px-3 py-1 rounded-lg">KELUAR</button>
                            </div>

                            {memoryDifficulty === null ? (
                                /* MENU MEMILIH TINGKAT KESULITAN (Easy, Medium, Hard) */
                                <div className="w-full flex flex-col gap-4 py-6 text-center">
                                    <h3 className="font-black text-xl text-black">PILIH TINGKAT KESULITAN ⚙️</h3>
                                    <p className="text-xs font-bold text-gray-500 uppercase">Makin sulit, makin banyak bintang!</p>

                                        >
                                            <span>🟢 EASY (8 KARTU)</span>
                                            <span className="text-xs bg-white px-2 py-1 rounded border-2 border-black">⭐ +10</span>
                                        </button>
                                        <button 
                                            onClick={() => startMemoryGame('medium')}
                                            className="bg-yellow-300 py-3.5 px-6 font-black text-lg border-3 border-black shadow-brutal rounded-2xl brutal-click flex justify-between items-center"
                                        >
                                            <span>🟡 MEDIUM (12 KARTU)</span>
                                            <span className="text-xs bg-white px-2 py-1 rounded border-2 border-black">⭐ +20</span>
                                        </button>
                                        <button 
                                            onClick={() => startMemoryGame('hard')}
                                            className="bg-rose-300 py-3.5 px-6 font-black text-lg border-3 border-black shadow-brutal rounded-2xl brutal-click flex justify-between items-center"

                                            <span>🔴 HARD (16 KARTU)</span>
                                            <span className="text-xs bg-white px-2 py-1 rounded border-2 border-black">⭐ +30</span>

                                /* AREA GAME CARDS GRID YANG TELAH DIOPTIMALKAN */

                                                <div 
                                                    key={card.id}

                                                            {card.type === 'emoji' ? (

                        <span>⬅️</span> Menu Utama
                    </button>

                    <div className={`bg-[#38BDF8] p-5 text-center flex flex-col items-center gap-2 mt-2 ${boxBrutal}`}>
                        <div className="text-5xl drop-shadow-md">⚙️</div>
                        <h2 className="font-black text-2xl text-black">PENGATURAN PROFIL</h2>
                        <p className="font-semibold text-sm text-black/85">Atur profil belajarmu di sini</p>
                    </div>

                    {/* Form Edit Nama */}
                    <div className="bg-white p-5 brutal-border shadow-brutal rounded-2xl flex flex-col gap-3 mt-2">
                        <label className="text-xs font-black text-gray-700 uppercase tracking-wider block text-left">Nama Profil Kamu:</label>
                        <input 
                            type="text" 
                            value={inputName} 
                            onChange={(e) => setInputName(e.target.value)} 
                            placeholder="Tulis namamu disini..."
                            className="w-full p-3 font-bold border-3 border-black rounded-xl outline-none"
                        />
                    </div>

                    {/* KECEPATAN BERBICARA SETTING */}
                    <div className="bg-white p-5 brutal-border shadow-brutal rounded-2xl flex flex-col gap-3">
                        <label className="text-xs font-black text-gray-700 uppercase tracking-wider block text-left">Kecepatan Bicara Suara: 🗣️</label>
                        <div className="grid grid-cols-3 gap-2 mt-1">
                            <button 
                                onClick={() => handleRateSelect(0.25)}
                                className={`py-2 text-xs font-black rounded-xl border-2 border-black transition-all brutal-click ${speechRate === 0.25 ? 'bg-orange-300 shadow-brutal-sm' : 'bg-white'}`}
                            >
                                Siput 🐌 (0.25x)
                            </button>
                            <button 
                                onClick={() => handleRateSelect(0.5)}
                                className={`py-2 text-xs font-black rounded-xl border-2 border-black transition-all brutal-click ${speechRate === 0.5 ? 'bg-yellow-300 shadow-brutal-sm' : 'bg-white'}`}
                            >
                                Kura-Kura 🐢 (0.5x)
                            </button>
                            <button 
                                onClick={() => handleRateSelect(1.0)}
                                className={`py-2 text-xs font-black rounded-xl border-2 border-black transition-all brutal-click ${speechRate === 1.0 ? 'bg-green-300 shadow-brutal-sm' : 'bg-white'}`}
                            >
                                Kelinci 🐇 (1x)
                            </button>
                        </div>
                    </div>

                    {/* Stats & Reset Bintang (Rapih, Compact, & Kecil) */}
                    <div className="bg-[#FFF8EA] p-4 brutal-border shadow-brutal rounded-2xl flex flex-col gap-2">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <span className="text-2xl">⭐</span>
                                <div className="text-left">
                                    <p className="text-[10px] font-bold text-gray-500 uppercase leading-tight">Total Bintang</p>
                                    <p className="text-lg font-black text-black leading-tight">{totalStars} Bintang</p>
                                </div>
                            </div>
                            <button 
                                onClick={() => setShowResetModal(true)} 
                                className="bg-rose-200 hover:bg-rose-300 px-2.5 py-1.5 font-bold text-[10px] border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] rounded-lg brutal-click text-rose-900 flex items-center gap-1 shrink-0"
                            >
                                <span>🗑️</span> Reset
                            </button>
                        </div>
                    </div>

                    {/* Tombol Simpan */}
                    <button 
                        onClick={saveProfile} 
                        className="w-full py-4 mt-2 bg-green-400 font-black text-lg border-3 border-black shadow-brutal rounded-xl brutal-click"
                    >
                        💾 SIMPAN PERUBAHAN
                    </button>

                    {/* RESET STARS CONFIRMATION MODAL */}
                    {showResetModal && (
                        <div className="absolute inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white brutal-border shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] rounded-3xl w-full max-w-[300px] p-5 flex flex-col items-center text-center gap-4 animate-in fade-in zoom-in duration-200">
                                <div className="text-4xl">⚠️</div>
                                <div>
                                    <h4 className="font-black text-xl text-black">Hapus Bintang?</h4>
                                    <p className="text-xs font-medium text-gray-600 mt-1">Apakah kamu yakin ingin mereset semua bintang belajarmu menjadi nol?</p>
                                </div>
                                <div className="flex gap-2 w-full mt-2">
                                    <button 
                                        onClick={confirmReset}
                                        className="flex-1 bg-rose-400 py-2 font-black text-xs border-2 border-black shadow-brutal-sm brutal-click rounded-lg text-rose-950"
                                    >
                                        YA, HAPUS
                                    </button>
                                    <button 
                                        onClick={() => setShowResetModal(false)}
                                        className="flex-1 bg-gray-200 py-2 font-black text-xs border-2 border-black shadow-brutal-sm brutal-click rounded-lg text-gray-700"
                                    >
                                        BATAL
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            // State global untuk navigasi screen
            const [currentScreen, setCurrentScreen] = useState('home');
            
            // Inisialisasi awal menggunakan localStorage agar nama "joujio" dan 0 bintang tersimpan aman secara permanen
            const [totalStars, setTotalStars] = useState(() => {
                const savedStars = localStorage.getItem('eb_stars');
                return savedStars !== null ? parseInt(savedStars, 10) : 0;
            });
            const [userName, setUserName] = useState(() => {
                const savedName = localStorage.getItem('eb_username');
                return savedName !== null ? savedName : '';
            });
            const [speechRate, setSpeechRate] = useState(() => {
                const savedRate = localStorage.getItem('eb_speech_rate');
                return savedRate !== null ? parseFloat(savedRate) : 0.5; // Default: 0.5 (Kura-kura 0.5x)
            });

            const [showOnboarding, setShowOnboarding] = useState(true);
            const [tempName, setTempName] = useState('');

            // Simpan perubahan nama ke dalam localStorage browser
            useEffect(() => {
                if (userName !== '') {
                    localStorage.setItem('eb_username', userName);
                    setShowOnboarding(false);
                } else {
                    setShowOnboarding(true);
                }
            }, [userName]);

            // Simpan perubahan bintang ke dalam localStorage browser
            useEffect(() => {
                localStorage.setItem('eb_stars', totalStars.toString());
            }, [totalStars]);

            // Simpan perubahan kecepatan suara ke dalam localStorage browser
            useEffect(() => {
                localStorage.setItem('eb_speech_rate', speechRate.toString());
            }, [speechRate]);

            const addStars = (amount) => {
                setTotalStars(prev => prev + amount);
            };

            const resetStars = () => {
                setTotalStars(0);
            };

            const handleOnboardingSubmit = () => {
                if (tempName.trim() === '') {
                    alert("Tulis namamu dulu ya agar petualangan bisa dimulai! ✨");
                    return;
                }
                const name = tempName.trim();
                setUserName(name);
                setTotalStars(0); // Garansi bintang diset 0 untuk pertama kali masuk
                speakText(`Hello, ${name}! Welcome to JJ Kids!`, 'en-US', speechRate);
            };

            // Render active screen secara dinamis berdasarkan state
            const renderScreen = () => {
                switch(currentScreen) {
                    case 'abjad': return <AbjadScreen navigate={setCurrentScreen} speechRate={speechRate} />;
                    case 'games': return <GamesScreen navigate={setCurrentScreen} addStars={addStars} speechRate={speechRate} />;
                    case 'kamus': return <KamusScreen navigate={setCurrentScreen} speechRate={speechRate} />;
                    case 'profile': return (
                        <ProfileScreen 
                            navigate={setCurrentScreen} 
                            totalStars={totalStars} 
                            resetStars={resetStars} 
                            userName={userName}
                            setUserName={setUserName}
                            speechRate={speechRate}
                            setSpeechRate={setSpeechRate}
                        />
                    );
                    case 'home':
                    default: return <HomeScreen navigate={setCurrentScreen} totalStars={totalStars} userName={userName} />;
                }
            };

            return (
                /* Mobile Device Mockup Wrapper */
                <div className="w-full max-w-[390px] h-[844px] max-h-[95vh] bg-dot-pattern border-[6px] border-black rounded-[32px] shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] relative overflow-hidden flex flex-col">
                    
                    {/* Simulated Status Bar area (optional aesthetic) */}
                    <div className="h-6 w-full bg-white/50 backdrop-blur-sm sticky top-0 z-50 flex justify-between px-6 pt-1 text-[10px] font-bold">
                        <span>9:41</span>
                        <div className="flex gap-1">
                            <span>📶</span><span>🔋</span>
                        </div>
                    </div>

                    {/* Main Content Area (Scrollable) */}
                    <div className="flex-1 overflow-y-auto no-scrollbar p-5 relative z-10">
                        {renderScreen()}
                    </div>

                    {/* ONBOARDING MODAL (SELAMAT DATANG - PERTAMA KALI MASUK) */}
                    {showOnboarding && (
                        <div className="absolute inset-0 bg-black/60 backdrop-blur-md z-[100] flex items-center justify-center p-5">
                            <div className="bg-white brutal-border shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] rounded-3xl w-full p-6 flex flex-col items-center text-center gap-4 animate-in fade-in zoom-in duration-200">
                                
                                <div className="text-6xl animate-bounce">🦖</div>
                                
                                <div>
                                    <h3 className="font-black text-2xl text-black leading-tight">SELAMAT DATANG!</h3>
                                    <p className="text-xs font-bold text-gray-500 mt-1 uppercase tracking-wider">Di JJ Kids</p>
                                </div>

                                <div className="bg-blue-50 border-2 border-black p-3.5 rounded-xl w-full">
                                    <p className="text-xs font-bold text-blue-950">Ayo tulis namamu di bawah ini untuk memulai belajar seru dengan 0 bintang!</p>
                                </div>

                                <div className="w-full text-left">
                                    <label className="text-[10px] font-black text-gray-600 block mb-1 uppercase tracking-wider">Siapa Namamu?</label>
                                    <input 
                                        type="text" 
                                        value={tempName}
                                        onChange={(e) => setTempName(e.target.value)}
                                        placeholder="Ketik nama kecilmu..." 
                                        className="w-full p-3 font-bold text-base border-3 border-black rounded-xl outline-none shadow-brutal-sm"
                                    />
                                </div>

                                <button 
                                    onClick={handleOnboardingSubmit}
                                    className="w-full py-4 mt-2 bg-[#FDE047] font-black text-lg border-3 border-black shadow-brutal rounded-xl brutal-click"
                                >
                                    MULAI PETUALANGAN! 🚀
                                </button>

                            </div>
                        </div>
                    )}

                </div>
            );
        };

        // Render React App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
